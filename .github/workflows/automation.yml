name: DB Intel Automation

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: intel-automation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compile-intel:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 urllib3

      - name: Run Intel Compiler
        run: python -u engine.py

      - name: Commit Database
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add files to tracking
          git add ratings.json statistics.md
          
          # Safely check for changes and commit
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          else
            git commit -m "Automated Intel DB update"
            git pull --rebase origin main
            git push
          fi
