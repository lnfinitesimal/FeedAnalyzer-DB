name: DB Intel Automation

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install cloudscraper

      - name: Run Intel Compiler
        run: python -u intel_compiler.py

      - name: Commit Database
        run: |
          git config --global user.name "Analyzer-Bot"
          git config --global user.email "bot@feedanalyzer.local"
          # || true ensures git doesn't crash if files are already tracked
          git add ratings.json statistics.md || true
          
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          else
            git commit -m "Automated Intel DB update"
            git push
            echo "Database successfully pushed to repository."
          fi
