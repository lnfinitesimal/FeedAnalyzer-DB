name: DB Intel Automation

on:
  schedule:
    # Run safely 4 times a day perfectly under the cloudflare radar
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

concurrency:
  group: intel-automation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compile-intel:
    runs-on: ubuntu-latest
    # Bumps the physical container time out 30 minutes beyond the Python script limits ensuring saves actually pass
    timeout-minutes: 270 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 urllib3

      - name: Run Intel Compiler
        run: python -u engine.py

      - name: Commit Database
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ratings.json statistics.md
          if git diff --staged --quiet; then
            echo "No changes detected. Concluding run smoothly."
            exit 0
          else
            git commit -m "Auto-update: DB Integrations"
            git pull --rebase origin main
            git push
          fi
