name: DB Intel Automation

on:
  schedule:
    - cron: '0 2 * * *'  # Runs once daily to save GitHub Action minutes!
  workflow_dispatch:

concurrency:
  group: intel-automation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compile-intel:
    runs-on: ubuntu-24.04  # FIX: Forces GitHub to use a newer, unburned IP pool
    timeout-minutes: 90
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install beautifulsoup4 curl_cffi

      - name: Run Intel Compiler
        env:
          MAX_PER_RUN: 150  # 150 max to guarantee it fits perfectly within the time limit
        run: python -u intel_compiler.py

      - name: Commit Database
        run: |
          git config --global user.name "Analyzer-Bot"
          git config --global user.email "bot@feedanalyzer.local"
          
          git pull --rebase origin main || true
          git add ratings.json statistics.md
          
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          else
            git commit -m "Automated Intel DB update"
            git push
            echo "Database successfully pushed to repository."
          fi
