name: DB Intel Automation

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: intel-automation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compile-intel:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install beautifulsoup4 curl_cffi tldextract pycountry

      - name: Run Intel Compiler
        run: python -u intel_compiler.py

      - name: Commit Database
        if: always()
        run: |
          git config --global user.name "Analyzer-Bot"
          git config --global user.email "bot@feedanalyzer.local"
          git add ratings.json statistics.md
          if git diff --staged --quiet; then
            echo "No changes detected."
            exit 0
          else
            git commit -m "Automated Intel DB update"
            git pull --rebase origin main
            git push
          fi
